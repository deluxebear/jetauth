appname = jetauth
httpport = 8000
runmode = dev
copyrequestbody = true
driverName = sqlite
dataSourceName = "file:jetauth.db?cache=shared"
dbName = jetauth
tableNamePrefix =
showSql = false
redisEndpoint =
bizPolicyCacheEnabled = false
bizReBACCacheL3Enabled = false
# ReBAC list endpoints (biz-list-objects, biz-list-users) rate limit
# Per (store, user/object) token bucket; defaults match spec §6.3.1.
rebacListObjectsRPS   = 20
rebacListObjectsBurst = 40
defaultStorageProvider =
isCloudIntranet = false
authState = "jetauth"
socks5Proxy = "127.0.0.1:10808"
verificationCodeTimeout = 10
initScore = 0
logPostOnly = true
isUsernameLowered = false
origin =
originFrontend =
staticBaseUrl = "https://cdn.casbin.org"
isDemoMode = false
batchSize = 100
showGithubCorner = false
forceLanguage = ""
defaultLanguage = "en"
aiAssistantUrl = "https://ai.casbin.com"
defaultApplication = "app-built-in"
maxItemsForFlatMenu = 7
enableErrorMask = false
enableGzip = true
inactiveTimeoutMinutes =
ldapServerPort =
ldapsCertId = ""
ldapsServerPort =
quota = {"organization": -1, "user": -1, "application": -1, "provider": -1}
logConfig = {"adapter":"console"}
initDataNewOnly = false
initDataFile =
frontendBaseDir =
# Comma-separated CIDRs that the Custom HTTP Email sender may reach despite
# the default private-IP SSRF block (RFC1918 / loopback / link-local / metadata).
# Leave empty to keep all private ranges blocked. Example: 10.0.0.0/8,172.20.0.0/16
ssrfAllowedHosts =

# ── WAF gateway listeners ────────────────────────────────────────────
# The gateway is a separate listener from the admin API (httpport above).
# Defaults are 80/443 and require root on Unix — override for local dev.
# See docs/configuration-reference.md for full config reference.
gatewayHttpPort  = 8080
gatewayHttpsPort = 8443

# ── Optional — absent from file, hard-coded default is false ─────────
# useGroupPathInToken = false
# enableErrorMask2    = false

# ── ACME / Let's Encrypt account (only needed if issuing certs) ──────
# acmeEmail      =
# acmePrivateKey =