# JetAuth 业务应用资源目录 · YAML 模板(推荐 — 易读、易 diff)
# 填好后通过「App 配置 → 资源目录 → 导入 → 标准模板」上传。
# 字段规格:
#   group        分组标签(可选),UI 折叠
#   name         唯一标识(必填),API 命名风格
#   displayName  显示名称(必填)
#   method       HTTP 方法(必填),字符串 "GET" 或数组 [GET, HEAD]
#   pattern      Casbin 匹配模式(必填)
#   matchMode    可选,默认 keyMatch2
#   description  可选描述

version: 1

resources:
  - group: 订单
    name: order_list
    displayName: 订单列表
    method: GET
    pattern: /api/orders
    description: 分页查询订单

  - group: 订单
    name: order_detail
    displayName: 订单详情
    method: GET
    pattern: /api/orders/:id

  - group: 订单
    name: order_create
    displayName: 创建订单
    method: POST
    pattern: /api/orders

  - group: 订单
    name: order_update
    displayName: 更新订单
    method: PUT
    pattern: /api/orders/:id

  - group: 客户
    name: customer_search
    displayName: 搜索客户
    method: [GET, HEAD]
    pattern: /api/customers
    description: 支持多字段匹配
